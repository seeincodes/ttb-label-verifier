{# Graceful-failure fragment for ExtractorError (and friends). Same
   no-<html>-shell rule as _result_panel.html. #}
<article class="rounded-lg border border-slate-300 bg-slate-100 p-6 shadow-sm">
  <div class="inline-flex items-center gap-2 rounded-full border border-slate-300 bg-white px-3 py-1 text-xs font-semibold uppercase tracking-wider text-slate-900">
    <span aria-hidden="true">●</span>
    <span>ERROR</span>
  </div>
  <h2 class="mt-3 text-lg font-semibold tracking-tight text-slate-900">{{ heading | default("Could not verify this label") }}</h2>
  <p class="mt-2 text-sm text-slate-700">{{ message }}</p>
  <p class="mt-4 text-xs text-slate-500">
    Please try again. If this persists, switch the EXTRACTOR_PROVIDER env var to fall back to OpenAI.
  </p>
</article>
